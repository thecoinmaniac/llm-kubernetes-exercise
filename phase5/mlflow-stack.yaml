apiVersion: v1
kind: Namespace
metadata:
  name: mlflow
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-data
  namespace: mlflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-server
  namespace: mlflow
  labels:
    app: mlflow-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-server
  template:
    metadata:
      labels:
        app: mlflow-server
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.13.2
          imagePullPolicy: IfNotPresent
          command: ["mlflow"]
          args:
            - "server"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "5000"
            - "--backend-store-uri"
            - "sqlite:////mlflow-data/mlflow.db"
            - "--serve-artifacts"
            - "--artifacts-destination"
            - "/mlflow-data/artifacts"
            - "--default-artifact-root"
            - "mlflow-artifacts:/"
          ports:
            - containerPort: 5000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow-data
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-server
  namespace: mlflow
  labels:
    app: mlflow-server
spec:
  selector:
    app: mlflow-server
  ports:
    - name: http
      port: 5000
      targetPort: http
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mlflow-local-tls
  namespace: mlflow
spec:
  secretName: mlflow-local-tls
  issuerRef:
    name: local-selfsigned
    kind: ClusterIssuer
  dnsNames:
    - mlflow.local
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlflow-server
  namespace: mlflow
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mlflow.local
      secretName: mlflow-local-tls
  rules:
    - host: mlflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mlflow-server
                port:
                  number: 5000
