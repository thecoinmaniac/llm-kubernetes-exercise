name: ci-train

on:
  workflow_dispatch:
    inputs:
      dataset_source:
        description: "local_jsonl or hf"
        required: true
        default: "hf"
      hf_dataset:
        description: "HF dataset id (used when dataset_source=hf)"
        required: false
        default: "rotten_tomatoes"
      max_steps:
        description: "Training max steps"
        required: false
        default: "2"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  train-phase5a1:
    runs-on: [self-hosted, linux, train]
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip wheel
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install transformers==4.45.2 datasets==2.21.0 mlflow==2.16.2 peft==0.12.0 accelerate==0.34.2 scikit-learn pandas sentencepiece huggingface_hub

      - name: Hugging Face auth (optional)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN not set; skipping Hugging Face login"
            exit 0
          fi
          source .venv/bin/activate
          python - <<'PY'
          from huggingface_hub import login
          import os
          login(token=os.environ['HF_TOKEN'])
          print('HF login completed')
          PY

      - name: Run Phase 5A.1 training workflow
        run: |
          source .venv/bin/activate
          if [ "${{ github.event.inputs.dataset_source }}" = "hf" ]; then
            bash phase5/phase5a1/run_phase5a1.sh \
              --dataset-source hf \
              --hf-dataset "${{ github.event.inputs.hf_dataset }}" \
              --hf-train-split train \
              --hf-eval-split validation \
              --hf-train-limit 80 \
              --hf-eval-limit 40 \
              --max-steps "${{ github.event.inputs.max_steps }}"
          else
            bash phase5/phase5a1/run_phase5a1.sh --max-steps "${{ github.event.inputs.max_steps }}"
          fi

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5a1-artifacts-${{ github.run_id }}
          path: |
            phase5/phase5a1/artifacts/comparison.json
            phase5/phase5a1/artifacts/baseline_predictions.csv
            phase5/phase5a1/artifacts/finetuned_predictions.csv
          if-no-files-found: warn
