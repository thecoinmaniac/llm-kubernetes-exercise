apiVersion: v1
kind: Namespace
metadata:
  name: ml-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-app-code
  namespace: ml-demo
data:
  server.py: |
    import json
    import os
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from urllib.parse import urlparse

    REQUEST_COUNT = 0

    class Handler(BaseHTTPRequestHandler):
        def _send(self, code, body, content_type="application/json"):
            self.send_response(code)
            self.send_header("Content-Type", content_type)
            self.end_headers()
            self.wfile.write(body.encode("utf-8"))

        def log_message(self, format, *args):
            return

        def do_GET(self):
            global REQUEST_COUNT
            parsed = urlparse(self.path)
            if parsed.path == "/healthz":
                self._send(200, '{"status":"ok"}')
                return
            if parsed.path == "/metrics":
                body = "# HELP inference_requests_total Total inference requests\n"
                body += "# TYPE inference_requests_total counter\n"
                body += f"inference_requests_total {REQUEST_COUNT}\n"
                self._send(200, body, "text/plain; version=0.0.4")
                return
            if parsed.path == "/":
                self._send(200, '{"service":"ml-demo-inference","message":"ready"}')
                return
            self._send(404, '{"error":"not found"}')

        def do_POST(self):
            global REQUEST_COUNT
            parsed = urlparse(self.path)
            if parsed.path != "/predict":
                self._send(404, '{"error":"not found"}')
                return

            content_len = int(self.headers.get("Content-Length", "0"))
            raw = self.rfile.read(content_len).decode("utf-8") if content_len else "{}"
            try:
                payload = json.loads(raw) if raw else {}
            except json.JSONDecodeError:
                self._send(400, '{"error":"invalid json"}')
                return

            text = str(payload.get("text", ""))
            REQUEST_COUNT += 1
            result = {
                "model": "rule-based-sentiment-v1",
                "input": text,
                "label": "positive" if "good" in text.lower() else "neutral",
                "request_count": REQUEST_COUNT
            }
            self._send(200, json.dumps(result))

    if __name__ == "__main__":
        port = int(os.getenv("PORT", "8000"))
        server = HTTPServer(("0.0.0.0", port), Handler)
        server.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-demo-inference
  namespace: ml-demo
  labels:
    app: ml-demo-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-demo-inference
  template:
    metadata:
      labels:
        app: ml-demo-inference
    spec:
      containers:
        - name: app
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/server.py"]
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: app-code
              mountPath: /app
      volumes:
        - name: app-code
          configMap:
            name: inference-app-code
---
apiVersion: v1
kind: Service
metadata:
  name: ml-demo-inference
  namespace: ml-demo
  labels:
    app: ml-demo-inference
spec:
  selector:
    app: ml-demo-inference
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ml-demo-inference
  namespace: ml-demo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: ml-demo.local
      http:
        paths:
          - path: /inference(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ml-demo-inference
                port:
                  number: 8000
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ml-demo-inference
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - ml-demo
  selector:
    matchLabels:
      app: ml-demo-inference
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
