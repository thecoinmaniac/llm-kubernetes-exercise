apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: local-selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ml-demo-local-tls
  namespace: ml-demo
spec:
  secretName: ml-demo-local-tls
  issuerRef:
    name: local-selfsigned
    kind: ClusterIssuer
  dnsNames:
    - ml-demo.local
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ml-demo-inference
  namespace: ml-demo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ml-demo.local
      secretName: ml-demo-local-tls
  rules:
    - host: ml-demo.local
      http:
        paths:
          - path: /inference(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ml-demo-inference
                port:
                  number: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-demo-inference
  namespace: ml-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-demo-inference
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ml-demo-quota
  namespace: ml-demo
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    pods: "10"
    services: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ml-demo-limits
  namespace: ml-demo
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 500m
        memory: 512Mi
      max:
        cpu: "1"
        memory: 1Gi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: ml-demo
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx-to-inference
  namespace: ml-demo
spec:
  podSelector:
    matchLabels:
      app: ml-demo-inference
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ml-demo-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: ml-demo.rules
      rules:
        - alert: MLDemoInferenceTargetDown
          expr: up{job="ml-demo-inference"} == 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "ml-demo inference target is down"
            description: "Prometheus cannot scrape ml-demo-inference for 2m."
